# =============================================================================
# QuantEngine Pro - Production Docker Compose
# =============================================================================
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose logs -f app        # Follow app logs
#   docker compose down               # Stop all services
#   docker compose --profile full up  # Include data downloader
# =============================================================================

services:
  # ---- Redis Cache ----
  redis:
    image: redis:7-alpine
    container_name: quantengine-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - quantengine-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---- QuantEngine Pro Application ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: quantengine-pro:latest
    container_name: quantengine-app
    ports:
      - "8050:8050"  # Dash dashboard
      - "8000:8000"  # FastAPI
    environment:
      - TZ=Asia/Shanghai
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:?err}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./config:/app/config:ro          # Config (read-only)
      - ./data:/app/data                  # Market data storage
      - ./logs:/app/logs                  # Application logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    networks:
      - quantengine-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---- Optional: Scheduled data downloader ----
  data-downloader:
    image: quantengine-pro:latest
    container_name: quantengine-downloader
    command: >
      sh -c "while true; do
        python scripts/download_data.py --market crypto --freq 1h --symbols BTC/USDT,ETH/USDT;
        sleep 3600;
      done"
    environment:
      - TZ=Asia/Shanghai
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:?err}
      - REDIS_HOST=redis
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - full
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - quantengine-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  quantengine-net:
    driver: bridge

volumes:
  redis_data:
    driver: local
