# =============================================================================
# QuantEngine Pro - LLM Configuration
# =============================================================================
# Provider options: deepseek | openai | anthropic | local
# DeepSeek uses OpenAI-compatible API format
# =============================================================================

llm:
  provider: deepseek            # Default: free DeepSeek API

  deepseek:
    api_key: "${DEEPSEEK_API_KEY}"     # Read from env var
    base_url: "https://api.deepseek.com"
    model: "deepseek-v4-flash"         # Fast, cost-effective
    # model: "deepseek-v4-pro"         # Higher quality, uncomment to upgrade
    max_tokens: 1024
    temperature: 0.3
    request_timeout: 30
    max_retries: 3
    retry_delay: 1.0

  # ---- Upgrade path: OpenAI ----
  # provider: openai
  # openai:
  #   api_key: "${OPENAI_API_KEY}"
  #   base_url: "https://api.openai.com/v1"
  #   model: "gpt-4"
  #   max_tokens: 1024
  #   temperature: 0.3

  # ---- Upgrade path: Anthropic (Claude) ----
  # provider: anthropic
  # anthropic:
  #   api_key: "${ANTHROPIC_API_KEY}"
  #   model: "claude-sonnet-4-6"

  # ---- News Analysis Settings ----
  news_analysis:
    enabled: true
    max_news_per_batch: 50       # Process max 50 articles per batch
    cache_results: true          # Don't re-analyze same text
    cache_ttl_hours: 24
    sentiment_threshold:
      positive: 0.6
      negative: 0.4
